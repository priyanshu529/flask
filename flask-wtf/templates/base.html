<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title%} flask WTF {% endblock %}</title>
</head>
<body>
    {% with messages = get_flashed_messages(with_categories=True) %}
    {%if messages %}
    
    {% for category, msg in messages %}
    <p style="color:green "> {{msg}} </p>
    {% endfor %}
    {% endif %}
    {% endwith %}
    {% block content %}
    {% endblock %}
    <footer>
        <p>copyright 2024</p>
    </footer>
</body>
</html>
